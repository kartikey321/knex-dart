name: knex_dart
description: A Dart SQL query builder inspired by Knex.js. Use driver packages (knex_dart_postgres, knex_dart_mysql, knex_dart_sqlite) to connect to databases.
version: 1.0.0
repository: https://github.com/kartikey321/knex-dart
homepage: https://github.com/kartikey321/knex-dart
issue_tracker: https://github.com/kartikey321/knex-dart/issues
topics:
  - sql
  - query-builder
  - database
  - orm
  - knex

environment:
  sdk: ^3.10.0

workspace:
  - drivers/knex_dart_postgres
  - drivers/knex_dart_mysql
  - drivers/knex_dart_sqlite

dependencies:
  logging: ^1.2.0
  meta: ^1.11.0
  collection: ^1.18.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  melos: ^7.0.0

melos:
  useRootAsPackage: true
  scripts:
    analyze:
      run: dart analyze --fatal-warnings
      exec:
        concurrency: 4
    test:
      run: dart test
      exec:
        concurrency: 4
    test:unit:
      run: dart test --exclude-tags=postgres,mysql,sqlite
      exec:
        concurrency: 1
        packageFilters:
          scope: knex_dart
