name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'knex_dart-v*.*.*'
      - 'knex_dart_postgres-v*.*.*'
      - 'knex_dart_mysql-v*.*.*'
      - 'knex_dart_sqlite-v*.*.*'
      - 'knex_dart_capabilities-v*.*.*'
      - 'knex_dart_lint-v*.*.*'
  pull_request:
    branches: [main]

jobs:
  # ── 1. Static analysis (all packages via melos) ──────────────────────────────
  analyze:
    name: Analyze (all packages)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Install melos
        run: dart pub global activate melos

      - name: Analyze
        run: melos run analyze

  # ── 2. Core unit tests + coverage (no DB required) ───────────────────────────
  test-core:
    name: Test & Coverage (core)
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run unit tests with coverage
        run: dart test --exclude-tags=postgres,mysql,sqlite --coverage=coverage

      - name: Format coverage to lcov
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json \
            --report-on=lib
          sed -i 's|SF:.*/lib|SF:lib|' coverage/lcov.info

      - name: Check coverage threshold (≥ 85%)
        run: |
          COVERAGE=$(awk -F: '/^LF/{lf+=$2} /^LH/{lh+=$2} END{printf "%.1f", lh*100/lf}' coverage/lcov.info)
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN{exit !(${COVERAGE} < 85)}"; then
            echo "::error::Coverage ${COVERAGE}% is below the required 85% threshold"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets the 85% threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ── 3. SQLite integration tests (no service container needed) ────────────────
  test-sqlite:
    name: Test (knex_dart_sqlite)
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run SQLite tests
        working-directory: drivers/knex_dart_sqlite
        run: dart test

  # ── 4. PostgreSQL integration tests ──────────────────────────────────────────
  test-postgres:
    name: Test (knex_dart_postgres)
    needs: analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knex
          POSTGRES_PASSWORD: knex
          POSTGRES_DB: knex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Set up schema and seed data
        working-directory: drivers/knex_dart_postgres
        run: |
          psql -h localhost -U knex -d knex_test -f test/integration/sql/postgres_schema.sql
          psql -h localhost -U knex -d knex_test -f test/integration/sql/postgres_seed.sql
        env:
          PGPASSWORD: knex

      - name: Run PostgreSQL tests
        working-directory: drivers/knex_dart_postgres
        run: dart test --tags=postgres
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: knex_test
          PG_USER: knex
          PG_PASSWORD: knex

  # ── 5. MySQL integration tests ────────────────────────────────────────────────
  test-mysql:
    name: Test (knex_dart_mysql)
    needs: analyze
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: knex_test
          MYSQL_USER: knex
          MYSQL_PASSWORD: knex
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Set up schema and seed data
        working-directory: drivers/knex_dart_mysql
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "ALTER USER 'knex'@'%' IDENTIFIED WITH mysql_native_password BY 'knex'; FLUSH PRIVILEGES;"
          mysql -h 127.0.0.1 -u knex -pknex knex_test < test/integration/sql/mysql_schema.sql
          mysql -h 127.0.0.1 -u knex -pknex knex_test < test/integration/sql/mysql_seed.sql

      - name: Run MySQL tests
        working-directory: drivers/knex_dart_mysql
        run: dart test --tags=mysql
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DATABASE: knex_test
          MYSQL_USER: knex
          MYSQL_PASSWORD: knex

  # ── 6. Publish all packages to pub.dev (version tags only) ───────────────────
  publish:
    name: Publish to pub.dev
    needs: [test-core, test-sqlite, test-postgres, test-mysql]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/knex_dart-') || startsWith(github.ref, 'refs/tags/knex_dart_postgres-') || startsWith(github.ref, 'refs/tags/knex_dart_mysql-') || startsWith(github.ref, 'refs/tags/knex_dart_sqlite-') || startsWith(github.ref, 'refs/tags/knex_dart_capabilities-') || startsWith(github.ref, 'refs/tags/knex_dart_lint-')

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Install melos
        run: dart pub global activate melos

      - name: Dry-run (all packages)
        run: melos publish

      - name: Publish changed packages
        run: melos publish --no-dry-run
        env:
          PUB_TOKEN: ${{ secrets.PUB_TOKEN }}
